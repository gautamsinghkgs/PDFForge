name: Ping Render (prevent cold start)

on:
  schedule:
    # Every 10 minutes — Render free tier spins down after 15 min idle
    - cron: '*/10 * * * *'
  workflow_dispatch: # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            https://pdfforge-server-8mwu.onrender.com/healthz \
            || echo "Ping failed"
