services:
  - type: web
    name: pdfforge-server
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/pdfforge
    region: singapore
    plan: free
    branch: main
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://pdfforge.vercel.app
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: PUPPETEER_DISABLE_SANDBOX
        value: "true"
